name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_GSC_VERIFICATION: ${{ secrets.PUBLIC_GSC_VERIFICATION }}
          PUBLIC_BING_VERIFICATION: ${{ secrets.PUBLIC_BING_VERIFICATION }}
          PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.PUBLIC_PLAUSIBLE_DOMAIN }}
          PUBLIC_CF_BEACON_TOKEN: ${{ secrets.PUBLIC_CF_BEACON_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow with sitemap URLs
        run: |
          set -euo pipefail
          # Wait for CDN to pick up new deploy
          sleep 30
          KEY="431ccfd3a43f79a7a9d0dcfc1419308f"
          HOST="dripmatiq.app"
          URLS=$(curl -sf "https://${HOST}/sitemap-0.xml" | grep -oE '<loc>[^<]+</loc>' | sed -E 's|</?loc>||g')
          if [[ -z "$URLS" ]]; then
            echo "No URLs from sitemap; skipping"
            exit 0
          fi
          URL_JSON=$(echo "$URLS" | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          PAYLOAD=$(printf '{"host":"%s","key":"%s","keyLocation":"https://%s/%s.txt","urlList":%s}' \
            "$HOST" "$KEY" "$HOST" "$KEY" "$URL_JSON")
          for ENDPOINT in https://api.indexnow.org/indexnow https://www.bing.com/indexnow; do
            CODE=$(curl -s -o /tmp/out -w "%{http_code}" -X POST "$ENDPOINT" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")
            echo "$ENDPOINT -> $CODE"
          done
