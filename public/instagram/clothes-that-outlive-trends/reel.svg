<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090A11"/>
      <stop offset="45%" stop-color="#121726"/>
      <stop offset="100%" stop-color="#1B1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.9">
      <stop offset="0%" stop-color="#D9B86A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D9B86A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D9B86A"/>
      <stop offset="100%" stop-color="#B78F3D"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <rect x="86" y="108" width="454" height="10" rx="5" fill="url(#bar)"/>
  <text x="86" y="165" fill="#EEE5D1" font-family="Arial, sans-serif" font-size="30" letter-spacing="1.6">DRIPMATIQ JOURNAL</text>

  <text x="86" y="260" fill="#D9B86A" font-family="Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="0.4">
    <tspan x="86" dy="0">Trends fade fast. Great pieces</tspan>
<tspan x="86" dy="52">still work a decade later.</tspan>
  </text>

  <text x="86" y="865" fill="#F6F2E8" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-weight="700">
    <tspan x="86" dy="0">Clothes That</tspan>
<tspan x="86" dy="84">Outlive Trends:</tspan>
<tspan x="86" dy="84">Building a</tspan>
<tspan x="86" dy="84">Wardrobe for</tspan>
<tspan x="86" dy="84">Decades</tspan>
  </text>

  <line x1="86" y1="1760" x2="994" y2="1760" stroke="#D9B86A" stroke-opacity="0.42" stroke-width="2"/>
  <text x="86" y="1814" fill="#CFC6B3" font-family="Arial, sans-serif" font-size="26" letter-spacing="2.2">DRIPMATIQ.APP</text>
