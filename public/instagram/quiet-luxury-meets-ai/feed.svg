  <text x="96" y="450" fill="#F8F4ED" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" letter-spacing="0.2"><tspan x="96" dy="0">Quiet Luxury Meets AI:</tspan><tspan x="96" dy="77">Why the Best Outfit App</tspan><tspan x="96" dy="77">Subtracts, Not Adds</tspan></text>

