    </linearGradient>
    <linearGradient id="brandBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A847" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#D4A847" stop-opacity="0.07"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Brand pill + accent -->
  <rect x="80" y="161" width="380" height="44" rx="22" fill="url(#brandBar)"/>
  <text x="100" y="191" font-family="Arial, sans-serif" font-size="20" fill="#D4A847" letter-spacing="2">DRIPMATIQ JOURNAL</text>
  <rect x="80" y="270" width="140" height="6" fill="#D4A847" rx="3"/>

  <text x="80" y="355" font-family="Georgia, serif" font-size="60" fill="#FFFFFF" font-weight="700">Dress Code Decoded: What</text>
  <text x="80" y="433" font-family="Georgia, serif" font-size="60" fill="#FFFFFF" font-weight="700">to Wear When You Have No</text>
  <text x="80" y="511" font-family="Georgia, serif" font-size="60" fill="#FFFFFF" font-weight="700">Idea</text>
