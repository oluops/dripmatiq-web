  <path d="M 290 1310 L 1120 1410" stroke="#f0cf74" stroke-width="2.5" opacity="0.42"/>

  <rect x="0" y="0" width="1080" height="128" fill="#090d18" opacity="0.78"/>
  <rect x="0" y="128" width="1080" height="4" fill="url(#gold)" opacity="0.95"/>
  <text x="540" y="92" text-anchor="middle" fill="#f5df9d" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" letter-spacing="2.2">DRIPMATIQ JOURNAL</text>

  <text x="86" y="700" fill="#f8f7f4" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" letter-spacing="0.4">
