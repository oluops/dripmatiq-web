<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Background accent -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#1a2a1a" opacity="0.6"/>
  <!-- Sun rays background -->
  <g stroke="#f5c842" stroke-width="1" opacity="0.15">
    <line x1="600" y1="315" x2="900" y2="100"/>
    <line x1="600" y1="315" x2="950" y2="200"/>
    <line x1="600" y1="315" x2="970" y2="315"/>
    <line x1="600" y1="315" x2="950" y2="430"/>
    <line x1="600" y1="315" x2="900" y2="530"/>
  </g>
  <!-- Piece 1: UPF sun-protective top -->
  <g transform="translate(120, 140)">
    <path d="M10,0 L50,0 L60,20 L55,110 L5,110 L0,20 Z" fill="#e8e0d0" opacity="0.9"/>
    <path d="M10,0 L0,20" fill="none" stroke="#c9b896" stroke-width="1.5"/>
    <path d="M50,0 L60,20" fill="none" stroke="#c9b896" stroke-width="1.5"/>
    <text x="30" y="130" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">UPF Top</text>
  </g>
  <!-- Piece 2: Midi skirt -->
  <g transform="translate(280, 130)">
    <path d="M15,0 L45,0 L65,160 L-5,160 Z" fill="#d4a574" opacity="0.85"/>
    <text x="30" y="180" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Midi Skirt</text>
  </g>
  <!-- Piece 3: Linen shorts -->
  <g transform="translate(450, 160)">
    <path d="M5,0 L55,0 L55,80 L35,80 L30,40 L25,80 L5,80 Z" fill="#f5f0e8" opacity="0.9"/>
    <text x="30" y="100" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Linen Shorts</text>
  </g>
  <!-- Piece 4: Lightweight layer -->
  <g transform="translate(620, 130)">
    <path d="M0,0 L30,-15 L60,0 L65,130 L45,140 L35,140 L15,140 L5,130 Z" fill="#b5c9b5" opacity="0.85"/>
    <text x="30" y="160" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Layer</text>
  </g>
  <!-- Piece 5: Sandals -->
  <g transform="translate(800, 200)">
    <ellipse cx="30" cy="50" rx="32" ry="12" fill="#c9a96e" opacity="0.85"/>
    <path d="M10,45 Q30,30 50,45" fill="none" stroke="#8b6914" stroke-width="2"/>
    <path d="M20,50 Q30,38 40,50" fill="none" stroke="#8b6914" stroke-width="2"/>
    <text x="30" y="80" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Sandals</text>
  </g>
  <!-- Piece 6: Hat -->
  <g transform="translate(960, 160)">
    <ellipse cx="30" cy="55" rx="45" ry="12" fill="#e8d5b7" opacity="0.9"/>
    <path d="M10,55 Q30,20 50,55" fill="#e8d5b7" opacity="0.9"/>
    <text x="30" y="85" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Hat</text>
  </g>
  <!-- Piece 7: Statement accessory -->
  <g transform="translate(1080, 180)">
    <circle cx="20" cy="30" r="18" fill="#c45a3c" opacity="0.85"/>
    <text x="20" y="60" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="10">Statement</text>
  </g>
  <!-- Title -->
  <text x="600" y="450" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="34" font-weight="bold">Summer Micro-Capsule: UPF + Cute</text>
  <text x="600" y="492" text-anchor="middle" fill="#f5c842" font-family="sans-serif" font-size="18">7 pieces · 14 looks · sun-safe all summer</text>
  <!-- Dripmatiq wordmark -->
  <text x="600" y="570" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="14" letter-spacing="3">DRIPMATIQ</text>
</svg>
