    <text x="685" y="317" fill="#06B6D4" text-anchor="middle" font-size="9">☔ Rain shell</text>

    <rect x="645" y="345" width="80" height="50" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="685" y="365" fill="#F9FAFB" text-anchor="middle" font-size="10" font-weight="600">Backup</text>
    <text x="685" y="380" fill="#9CA3AF" text-anchor="middle" font-size="9">Knit + jeans</text>

    <!-- TUE -->
    <rect x="735" y="195" width="80" height="140" rx="10" fill="#111827" stroke="#374151"/>
    <rect x="745" y="205" width="60" height="60" rx="6" fill="url(#warm)" opacity="0.3"/>
    <text x="775" y="280" fill="#F9FAFB" text-anchor="middle" font-weight="600" font-size="11">Look 1</text>
    <text x="775" y="293" fill="#9CA3AF" text-anchor="middle">Tee + linen</text>
    <text x="775" y="305" fill="#9CA3AF" text-anchor="middle">Loafers</text>
    <text x="775" y="317" fill="#22C55E" text-anchor="middle" font-size="9">☀️ No rain</text>

    <rect x="735" y="345" width="80" height="50" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="775" y="365" fill="#F9FAFB" text-anchor="middle" font-size="10" font-weight="600">Backup</text>
    <text x="775" y="380" fill="#9CA3AF" text-anchor="middle" font-size="9">Polo + shorts</text>

    <!-- WED -->
    <rect x="825" y="195" width="80" height="140" rx="10" fill="#111827" stroke="#374151"/>
    <rect x="835" y="205" width="60" height="60" rx="6" fill="url(#cool)" opacity="0.3"/>
    <text x="865" y="280" fill="#F9FAFB" text-anchor="middle" font-weight="600" font-size="11">Look 1</text>
    <text x="865" y="293" fill="#9CA3AF" text-anchor="middle">Sweater +</text>
    <text x="865" y="305" fill="#9CA3AF" text-anchor="middle">trousers</text>
    <text x="865" y="317" fill="#EAB308" text-anchor="middle" font-size="9">🌤 Partly</text>

    <rect x="825" y="345" width="80" height="50" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="865" y="365" fill="#F9FAFB" text-anchor="middle" font-size="10" font-weight="600">Backup</text>
    <text x="865" y="380" fill="#9CA3AF" text-anchor="middle" font-size="9">Hoodie + denim</text>

    <!-- THU -->
    <rect x="915" y="195" width="80" height="140" rx="10" fill="#111827" stroke="#374151"/>
    <rect x="925" y="205" width="60" height="60" rx="6" fill="url(#warm)" opacity="0.3"/>
    <text x="955" y="280" fill="#F9FAFB" text-anchor="middle" font-weight="600" font-size="11">Look 1</text>
    <text x="955" y="293" fill="#9CA3AF" text-anchor="middle">Shirt +</text>
    <text x="955" y="305" fill="#9CA3AF" text-anchor="middle">chinos</text>
    <text x="955" y="317" fill="#22C55E" text-anchor="middle" font-size="9">☀️ Sunny</text>

    <rect x="915" y="345" width="80" height="50" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="955" y="365" fill="#F9FAFB" text-anchor="middle" font-size="10" font-weight="600">Backup</text>
    <text x="955" y="380" fill="#9CA3AF" text-anchor="middle" font-size="9">Tee + bomber</text>

    <!-- FRI -->
    <rect x="1005" y="195" width="80" height="140" rx="10" fill="#111827" stroke="#374151"/>
    <rect x="1015" y="205" width="60" height="60" rx="6" fill="url(#warm)" opacity="0.3"/>
    <text x="1045" y="280" fill="#F9FAFB" text-anchor="middle" font-weight="600" font-size="11">Look 1</text>
    <text x="1045" y="293" fill="#9CA3AF" text-anchor="middle">Polos +</text>
    <text x="1045" y="305" fill="#9CA3AF" text-anchor="middle">shorts</text>
    <text x="1045" y="317" fill="#22C55E" text-anchor="middle" font-size="9">☀️ Warm</text>

    <rect x="1005" y="345" width="80" height="50" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="1045" y="365" fill="#F9FAFB" text-anchor="middle" font-size="10" font-weight="600">Backup</text>
    <text x="1045" y="380" fill="#9CA3AF" text-anchor="middle" font-size="9">Henley + jeans</text>
  </g>

  <!-- Bottom stats bar -->
  <rect x="640" y="410" width="440" height="80" rx="12" fill="#111827" stroke="#374151"/>
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="670" y="438" fill="#06B6D4" font-size="12" font-weight="600">THIS WEEK</text>
    <text x="670" y="462" fill="#F9FAFB" font-size="24" font-weight="700">5</text>
    <text x="705" y="462" fill="#9CA3AF" font-size="14">outfits planned</text>

    <text x="860" y="438" fill="#F59E0B" font-size="12" font-weight="600">GAPS FOUND</text>
    <text x="860" y="462" fill="#F9FAFB" font-size="24" font-weight="700">1</text>
    <text x="895" y="462" fill="#9CA3AF" font-size="14">waterproof shell</text>

    <text x="1030" y="438" fill="#22C55E" font-size="12" font-weight="600">WEAR RATE</text>
    <text x="1030" y="462" fill="#F9FAFB" font-size="24" font-weight="700">92%</text>
    <text x="1070" y="462" fill="#9CA3AF" font-size="14">planned → worn</text>
  </g>

  <!-- Title -->
  <text x="80" y="52" fill="#E5E7EB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="28" font-weight="700">Dress for the Weather Outfit App</text>
</svg>