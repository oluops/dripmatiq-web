  <!-- Outfit 1 -->
  <rect x="220" y="530" width="280" height="100" rx="14" fill="#111827" stroke="#374151"/>
  <rect x="232" y="542" width="72" height="72" rx="10" fill="url(#warm)"/>
  <!-- Outfit items as small rects -->
  <rect x="314" y="542" width="16" height="20" rx="3" fill="#6B7280" opacity="0.8"/>
  <rect x="314" y="568" width="16" height="20" rx="3" fill="#4B5563"/>
  <rect x="314" y="594" width="16" height="20" rx="3" fill="#9CA3AF"/>
  <text x="340" y="555" fill="#F9FAFB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11" font-weight="600">Look 1</text>
  <text x="340" y="570" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">Merino + Blazer + Chinos</text>
  <text x="340" y="583" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">Chelsea boots (waterproof)</text>
  <text x="340" y="596" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">+ packable rain shell</text>

  <!-- Outfit 2 -->
  <rect x="220" y="640" width="280" height="100" rx="14" fill="#111827" stroke="#374151"/>
  <rect x="232" y="652" width="72" height="72" rx="10" fill="url(#cool)"/>
  <rect x="314" y="652" width="16" height="20" rx="3" fill="#6B7280" opacity="0.8"/>
  <rect x="314" y="678" width="16" height="20" rx="3" fill="#4B5563"/>
  <rect x="314" y="704" width="16" height="20" rx="3" fill="#9CA3AF"/>
  <text x="340" y="665" fill="#F9FAFB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11" font-weight="600">Look 2</text>
  <text x="340" y="680" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">Tee + Cardigan + Jeans</text>
  <text x="340" y="693" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">White sneakers + umbrella</text>
  <text x="340" y="706" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="10">Casual backup</text>

