<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dress for the weather outfit app hero image</title>
  <desc id="desc">Mobile app screen showing today's weather, calendar events, and three AI-generated outfit recommendations from user's digital closet</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cool" x1="140" y1="120" x2="420" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="warm" x1="760" y1="180" x2="1030" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="rain" x1="400" y1="200" x2="700" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="80" y="40" width="1040" height="540" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#glow)" opacity="0.25">
    <circle cx="200" cy="200" r="100" fill="#06B6D4"/>
    <circle cx="950" cy="280" r="120" fill="#3B82F6"/>
    <circle cx="550" cy="500" r="90" fill="#F59E0B"/>
  </g>

  <!-- Phone frame -->
  <rect x="180" y="60" width="360" height="640" rx="40" fill="#0F172A" stroke="#334155" stroke-width="3"/>
  <rect x="210" y="90" width="300" height="580" rx="24" fill="#020617"/>

  <!-- Status bar -->
  <rect x="220" y="105" width="280" height="24" rx="12" fill="#0F172A"/>
  <text x="240" y="122" fill="#E5E7EB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="13" font-weight="500">9:41</text>
  <text x="450" y="122" fill="#E5E7EB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="13" font-weight="500" text-anchor="end">54° ☔</text>

  <!-- Today header -->
  <text x="230" y="165" fill="#F9FAFB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="24" font-weight="700">Today</text>
  <text x="230" y="190" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14">Mon, Jul 14 • 54°F • Rain 80%</text>

  <!-- Weather card -->
  <rect x="220" y="200" width="280" height="110" rx="16" fill="url(#cool)" opacity="0.15" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="230" fill="#06B6D4" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="12" font-weight="600">FORECAST</text>
  <text x="240" y="265" fill="#F9FAFB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="36" font-weight="700">54°</text>
  <text x="300" y="265" fill="#9CA3AF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="16">Feels 51°</text>
  <text x="240" y="295" fill="#E5E7EB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="13">Rain 8 AM - 12 PM • Wind SW 12mph</text>

  <!-- Hourly chips -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="11" font-weight="500">
    <rect x="230" y="305" width="48" height="24" rx="12" fill="#06B6D4" opacity="0.2"/>
    <text x="254" y="322" fill="#06B6D4" text-anchor="middle">7 AM</text>
    <text x="254" y="338" fill="#06B6D4" text-anchor="middle" font-size="10">52°</text>

    <rect x="288" y="305" width="48" height="24" rx="12" fill="#06B6D4" opacity="0.2"/>
    <text x="312" y="322" fill="#06B6D4" text-anchor="middle">9 AM</text>
    <text x="312" y="338" fill="#06B6D4" text-anchor="middle" font-size="10">53°</text>

    <rect x="346" y="305" width="48" height="24" rx="12" fill="#06B6D4" opacity="0.35"/>
    <text x="370" y="322" fill="#06B6D4" text-anchor="middle">11 AM</text>
    <text x="370" y="338" fill="#06B6D4" text-anchor="middle" font-size="10">55°</text>

    <rect x="404" y="305" width="48" height="24" rx="12" fill="#06B6D4" opacity="0.2"/>
    <text x="428" y="322" fill="#06B6D4" text-anchor="middle">1 PM</text>
    <text x="428" y="338" fill="#06B6D4" text-anchor="middle" font-size="10">58°</text>
  </g>

  <!-- Calendar events -->
  <rect x="220" y="355" width="280" height="140" rx="16" fill="#111827" stroke="#374151"/>
  <text x="240" y="385" fill="#F9FAFB" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="14" font-weight="600">CALENDAR</text>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="12">
    <circle cx="245" cy="410" r="5" fill="#3B82F6"/>
    <text x="260" y="414" fill="#E5E7EB">9:00  Client standup</text>

    <circle cx="245" cy="435" r="5" fill="#22C55E"/>
    <text x="260" y="439" fill="#E5E7EB">12:30  Walking lunch</text>

    <circle cx="245" cy="460" r="5" fill="#A855F7"/>
    <text x="260" y="464" fill="#E5E7EB">5:30  Team drinks</text>
