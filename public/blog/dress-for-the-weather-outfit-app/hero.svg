    <text x="760" y="182" fill="#F9FAFB" text-anchor="middle" font-size="14">62° ☀️</text>
    <text x="850" y="182" fill="#F9FAFB" text-anchor="middle" font-size="14">58° 🌤</text>
    <text x="940" y="182" fill="#F9FAFB" text-anchor="middle" font-size="14">65° ☀️</text>
    <text x="1030" y="182" fill="#F9FAFB" text-anchor="middle" font-size="14">68° 🌤</text>
