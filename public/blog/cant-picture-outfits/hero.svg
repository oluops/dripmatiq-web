<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#f0c674"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Thought bubble dissolving -->
  <ellipse cx="400" cy="250" rx="120" ry="90" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 4"/>
  <ellipse cx="400" cy="250" rx="80" ry="60" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" stroke-dasharray="4 6"/>
  <!-- Question mark inside bubble -->
  <text x="400" y="270" font-family="Georgia, serif" font-size="60" fill="#ffffff" text-anchor="middle" opacity="0.15">?</text>
  <!-- Arrow -->
  <line x1="540" y1="250" x2="620" y2="250" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <polygon points="620,243 640,250 620,257" fill="#d4a853" opacity="0.6"/>
  <!-- Grid of wardrobe thumbnails -->
  <rect x="680" y="160" width="70" height="70" rx="4" fill="#d4a853" opacity="0.5"/>
  <rect x="760" y="160" width="70" height="70" rx="4" fill="#f0c674" opacity="0.4"/>
  <rect x="840" y="160" width="70" height="70" rx="4" fill="#d4a853" opacity="0.3"/>
  <rect x="680" y="240" width="70" height="70" rx="4" fill="#f0c674" opacity="0.35"/>
  <rect x="760" y="240" width="70" height="70" rx="4" fill="#d4a853" opacity="0.45"/>
  <rect x="840" y="240" width="70" height="70" rx="4" fill="#f0c674" opacity="0.5"/>
  <rect x="680" y="320" width="70" height="70" rx="4" fill="#d4a853" opacity="0.25"/>
  <rect x="760" y="320" width="70" height="70" rx="4" fill="#f0c674" opacity="0.3"/>
  <rect x="840" y="320" width="70" height="70" rx="4" fill="#d4a853" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="480" font-family="Georgia, serif" font-size="40" fill="#f0c674" text-anchor="middle" font-weight="bold">Can't Picture Outfits?</text>
  <text x="600" y="530" font-family="Georgia, serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.7">You're Not Alone</text>
  <!-- Corner accents -->
  <rect x="50" y="50" width="60" height="3" fill="url(#gold)" opacity="0.8"/>
  <rect x="50" y="50" width="3" height="60" fill="url(#gold)" opacity="0.8"/>
  <rect x="1090" y="577" width="60" height="3" fill="url(#gold)" opacity="0.8"/>
  <rect x="1147" y="520" width="3" height="60" fill="url(#gold)" opacity="0.8"/>
  <!-- Watermark -->
  <text x="600" y="590" font-family="Georgia, serif" font-size="16" fill="#d4a853" text-anchor="middle" opacity="0.5">dripmatiq.app</text>
</svg>
