<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Background accent -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#1a1a2e" opacity="0.6"/>
  <!-- Linen texture lines -->
  <g stroke="#d4a574" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="100" x2="100" y2="530"/>
    <line x1="120" y1="100" x2="120" y2="530"/>
    <line x1="140" y1="100" x2="140" y2="530"/>
    <line x1="160" y1="100" x2="160" y2="530"/>
    <line x1="180" y1="100" x2="180" y2="530"/>
  </g>
  <!-- Piece 1: Blazer silhouette -->
  <g transform="translate(150, 150)">
    <path d="M0,0 L30,-20 L60,0 L55,120 L35,130 L25,130 L5,120 Z" fill="#c9b896" opacity="0.9"/>
    <text x="30" y="160" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Blazer</text>
  </g>
  <!-- Piece 2: Wide trousers -->
  <g transform="translate(320, 150)">
    <path d="M10,0 L50,0 L60,140 L40,140 L30,60 L20,140 L0,140 Z" fill="#f5f0e8" opacity="0.9"/>
    <text x="30" y="160" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Trousers</text>
  </g>
  <!-- Piece 3: Trapeze dress -->
  <g transform="translate(490, 140)">
    <path d="M20,0 L40,0 L65,150 L-5,150 Z" fill="#c45a3c" opacity="0.85"/>
    <text x="30" y="170" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Dress</text>
  </g>
  <!-- Piece 4: Tank top -->
  <g transform="translate(660, 170)">
    <path d="M10,0 L40,0 L45,80 L5,80 Z" fill="#fffff0" opacity="0.9"/>
    <path d="M10,0 L5,-10 L15,-10 Z" fill="#fffff0" opacity="0.9"/>
    <path d="M40,0 L45,-10 L35,-10 Z" fill="#fffff0" opacity="0.9"/>
    <text x="25" y="100" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Tank</text>
  </g>
  <!-- Piece 5: Espadrille -->
  <g transform="translate(820, 220)">
    <ellipse cx="25" cy="30" rx="30" ry="12" fill="#d4a574" opacity="0.8"/>
    <path d="M5,25 Q25,10 45,25" fill="none" stroke="#8b6914" stroke-width="2"/>
    <text x="25" y="65" text-anchor="middle" fill="#e8d5b7" font-family="sans-serif" font-size="11">Espadrilles</text>
  </g>
  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="36" font-weight="bold">5-Piece Euro Summer Capsule</text>
  <text x="600" y="500" text-anchor="middle" fill="#d4a574" font-family="sans-serif" font-size="18">Desk to Departure Gate</text>
  <!-- Dripmatiq wordmark -->
  <text x="600" y="570" text-anchor="middle" fill="#666666" font-family="sans-serif" font-size="14" letter-spacing="3">DRIPMATIQ</text>
</svg>
