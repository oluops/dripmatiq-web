<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Closet rack (left side) -->
  <line x1="80" y1="160" x2="520" y2="160" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Hangers -->
  <g fill="none" stroke="#444" stroke-width="2">
    <!-- Hanger 1 -->
    <line x1="140" y1="160" x2="140" y2="170"/>
    <path d="M110,220 Q140,195 170,220 L180,270 H100 Z" fill="#2a2a3a" stroke="#555"/>
    <!-- Hanger 2 -->
    <line x1="210" y1="160" x2="210" y2="170"/>
    <path d="M185,210 Q210,190 235,210 L245,280 H175 Z" fill="#1e3a4a" stroke="#555"/>
    <!-- Hanger 3 -->
    <line x1="280" y1="160" x2="280" y2="170"/>
    <path d="M255,220 Q280,195 305,220 L310,260 H250 Z" fill="#3a2a1a" stroke="#555"/>
    <!-- Hanger 4 -->
    <line x1="350" y1="160" x2="350" y2="170"/>
    <path d="M325,215 Q350,192 375,215 L382,275 H318 Z" fill="#1a3a2a" stroke="#555"/>
    <!-- Hanger 5 (highlighted) -->
    <line x1="420" y1="160" x2="420" y2="170"/>
    <path d="M395,210 Q420,185 445,210 L452,270 H388 Z" fill="#2a1a3a" stroke="url(#accentGrad)" stroke-width="2.5"/>
  </g>
  
  <!-- AI suggestion panel (right side) -->
  <rect x="600" y="100" width="520" height="420" rx="16" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Panel header gradient bar -->
  <rect x="600" y="100" width="520" height="4" rx="2" fill="url(#accentGrad)"/>
  
  <!-- Panel title -->
  <text x="860" y="148" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#6366f1" letter-spacing="3" font-weight="500">AI OUTFIT SUGGESTION</text>
  
  <!-- Outfit card in panel -->
  <rect x="630" y="165" width="460" height="200" rx="12" fill="#1a1a2a"/>
  <!-- Outfit items represented as color blocks -->
  <rect x="660" y="185" width="80" height="110" rx="8" fill="#c4a882"/>
  <text x="700" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">linen blazer</text>
  
  <rect x="760" y="185" width="80" height="110" rx="8" fill="#1e2d4a"/>
  <text x="800" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">navy wide-leg</text>
  
  <rect x="860" y="185" width="80" height="110" rx="8" fill="#8b6a4a"/>
  <text x="900" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">block heel</text>
  
  <rect x="960" y="185" width="80" height="50" rx="8" fill="#c0a060"/>
  <text x="1000" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">gold earrings</text>
  
  <!-- Match score -->
  <text x="660" y="345" font-family="system-ui, sans-serif" font-size="12" fill="#888">Match confidence</text>
  <rect x="660" y="355" width="300" height="6" rx="3" fill="#222"/>
  <rect x="660" y="355" width="264" height="6" rx="3" fill="url(#accentGrad)"/>
  <text x="972" y="364" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" font-weight="600">88%</text>
  
  <!-- Action buttons -->
  <rect x="630" y="380" width="215" height="44" rx="10" fill="url(#accentGrad)"/>
  <text x="737" y="407" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">Wear This</text>
  
  <rect x="855" y="380" width="215" height="44" rx="10" fill="#1a1a1a" stroke="#333"/>
  <text x="962" y="407" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#888" font-weight="500">Next Outfit</text>
  
  <!-- Panel bottom question -->
  <text x="860" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#555">Built from your 47 closet items</text>
  
  <!-- Main headline -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="42" fill="white" font-weight="700">What Should I Wear Today?</text>
  <text x="600" y="598" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#6b6b8a">Your closet. Your AI. Zero guessing.</text>
</svg>
