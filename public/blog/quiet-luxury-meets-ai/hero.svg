<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Minimal wardrobe shapes -->
  <rect x="200" y="120" width="3" height="400" fill="#1a1a2e" rx="1"/>
  <rect x="997" y="120" width="3" height="400" fill="#1a1a2e" rx="1"/>
  <rect x="200" y="118" width="800" height="4" fill="#1a1a2e" rx="2"/>
  <!-- Hangers -->
  <g stroke="#333" stroke-width="2" fill="none">
    <path d="M350 140 L350 155 L320 180 L380 180 L350 155"/>
    <path d="M500 140 L500 155 L470 180 L530 180 L500 155"/>
    <path d="M650 140 L650 155 L620 180 L680 180 L650 155"/>
    <path d="M800 140 L800 155 L770 180 L830 180 L800 155"/>
  </g>
  <!-- Garment silhouettes - minimal, clean -->
  <rect x="330" y="180" width="40" height="120" rx="4" fill="#1c1c2e" opacity="0.8"/>
  <rect x="480" y="180" width="40" height="140" rx="4" fill="#2a2a3e" opacity="0.7"/>
  <rect x="630" y="180" width="40" height="110" rx="4" fill="#1e1e30" opacity="0.9"/>
  <rect x="780" y="180" width="40" height="130" rx="4" fill="#252538" opacity="0.75"/>
  <!-- Subtle highlight on one piece - "the chosen outfit" -->
  <rect x="628" y="178" width="44" height="114" rx="5" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
  <!-- Subtract symbol -->
  <rect x="560" y="420" width="80" height="3" fill="#c9a96e" opacity="0.5" rx="1"/>
  <!-- Bottom text -->
  <text x="600" y="560" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="14" letter-spacing="4">SUBTRACT, NOT ADD</text>
</svg>
