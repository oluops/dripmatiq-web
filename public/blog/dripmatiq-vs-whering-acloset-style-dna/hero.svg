<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="COMPARISON: Dripmatiq vs. Whering vs. Acloset vs. Style DNA">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0e2b"/>
      <stop offset="100%" stop-color="#100818"/>
    </linearGradient>
    <linearGradient id="vg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Four app card columns -->
  <rect x="820" y="110" width="80" height="130" rx="10" fill="#1e1030" stroke="#c9a84c" stroke-width="2"/>
  <rect x="920" y="130" width="80" height="110" rx="10" fill="#1a1028" stroke="#444" stroke-width="1.5"/>
  <rect x="820" y="260" width="80" height="110" rx="10" fill="#1a1028" stroke="#444" stroke-width="1.5"/>
  <rect x="920" y="260" width="80" height="110" rx="10" fill="#1a1028" stroke="#444" stroke-width="1.5"/>
  <!-- Labels inside cards -->
  <text x="860" y="185" text-anchor="middle" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1">DRIP</text>
  <text x="860" y="199" text-anchor="middle" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1">MATIQ</text>
  <text x="960" y="196" text-anchor="middle" fill="#777" font-family="system-ui,sans-serif" font-size="10" letter-spacing="1">WHERING</text>
  <text x="860" y="323" text-anchor="middle" fill="#777" font-family="system-ui,sans-serif" font-size="10" letter-spacing="1">ACLOSET</text>
  <text x="960" y="316" text-anchor="middle" fill="#777" font-family="system-ui,sans-serif" font-size="9" letter-spacing="1">STYLE</text>
  <text x="960" y="329" text-anchor="middle" fill="#777" font-family="system-ui,sans-serif" font-size="9" letter-spacing="1">DNA</text>
  <!-- Check / X marks -->
  <text x="860" y="230" text-anchor="middle" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="18">✓</text>
  <text x="960" y="222" text-anchor="middle" fill="#555" font-family="system-ui,sans-serif" font-size="18">✗</text>
  <text x="860" y="350" text-anchor="middle" fill="#555" font-family="system-ui,sans-serif" font-size="18">✗</text>
  <text x="960" y="350" text-anchor="middle" fill="#555" font-family="system-ui,sans-serif" font-size="18">✗</text>
  <rect width="1200" height="630" fill="url(#vg)"/>
  <g transform="translate(80,80)">
    <circle cx="0" cy="0" r="6" fill="#c9a84c"/>
    <text x="18" y="6" fill="#c9a84c" font-family="Georgia,serif" font-size="20" font-weight="600" letter-spacing="3">DRIPMATIQ</text>
  </g>
  <text x="80" y="290" fill="#c9a84c" font-family="system-ui,sans-serif" font-size="16" font-weight="700" letter-spacing="4">COMPARISON</text>
  <rect x="80" y="305" width="48" height="3" fill="#c9a84c"/>
  <text x="80" y="368" fill="#ffffff" font-family="Georgia,serif" font-size="52" font-weight="700">Which Wardrobe</text>
  <text x="80" y="432" fill="#ffffff" font-family="Georgia,serif" font-size="52" font-weight="700">App Is Right?</text>
  <text x="80" y="540" fill="#888" font-family="system-ui,sans-serif" font-size="14" letter-spacing="2">DRIPMATIQ.APP / BLOG</text>
</svg>
