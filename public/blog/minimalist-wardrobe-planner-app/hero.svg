  <text x="120" y="620" fill="#34D399" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">30 pieces</text>
  <text x="280" y="620" fill="#60A5FA" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">50+ outfits</text>
