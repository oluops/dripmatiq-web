<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#f0c674"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative shelf lines -->
  <rect x="150" y="280" width="900" height="3" fill="url(#gold)" opacity="0.6"/>
  <rect x="200" y="380" width="800" height="2" fill="url(#gold)" opacity="0.3"/>
  <!-- Folded fabric shapes -->
  <rect x="300" y="240" width="80" height="35" rx="4" fill="#d4a853" opacity="0.5"/>
  <rect x="420" y="235" width="90" height="40" rx="4" fill="#f0c674" opacity="0.4"/>
  <rect x="560" y="238" width="75" height="37" rx="4" fill="#d4a853" opacity="0.6"/>
  <rect x="700" y="240" width="85" height="35" rx="4" fill="#f0c674" opacity="0.35"/>
  <!-- Title text -->
  <text x="600" y="160" font-family="Georgia, serif" font-size="48" fill="#f0c674" text-anchor="middle" font-weight="bold">Summer Shorts</text>
  <text x="600" y="220" font-family="Georgia, serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">Already in Your Closet</text>
  <!-- Subtitle -->
  <text x="600" y="480" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.6">A Shop-Your-Closet Guide</text>
  <!-- Corner accents -->
  <rect x="50" y="50" width="60" height="3" fill="url(#gold)" opacity="0.8"/>
  <rect x="50" y="50" width="3" height="60" fill="url(#gold)" opacity="0.8"/>
  <rect x="1090" y="577" width="60" height="3" fill="url(#gold)" opacity="0.8"/>
  <rect x="1147" y="520" width="3" height="60" fill="url(#gold)" opacity="0.8"/>
  <!-- Dripmatiq watermark -->
  <text x="600" y="570" font-family="Georgia, serif" font-size="16" fill="#d4a853" text-anchor="middle" opacity="0.5">dripmatiq.app</text>
</svg>
