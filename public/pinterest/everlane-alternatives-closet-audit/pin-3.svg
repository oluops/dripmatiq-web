<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1500" viewBox="0 0 1000 1500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1500" fill="url(#bg)"/>
  
  <rect x="400" y="180" width="200" height="4" fill="#d4af37"/>
  <text x="500" y="260" font-family="Georgia, serif" font-size="24" fill="#d4af37" text-anchor="middle" letter-spacing="4">THINK DIFFERENT</text>
  <text x="500" y="450" font-family="Georgia, serif" font-size="54" fill="#ffffff" text-anchor="middle" font-style="italic">What if your closet</text>
  <text x="500" y="520" font-family="Georgia, serif" font-size="54" fill="#ffffff" text-anchor="middle" font-style="italic">already has everything</text>
  <text x="500" y="590" font-family="Georgia, serif" font-size="54" fill="#ffffff" text-anchor="middle" font-style="italic">you need?</text>
  <rect x="350" y="660" width="300" height="2" fill="#d4af37" opacity="0.5"/>
  <text x="500" y="750" font-family="Georgia, serif" font-size="30" fill="#aaa" text-anchor="middle">When Everlane sold to Shein,</text>
  <text x="500" y="795" font-family="Georgia, serif" font-size="30" fill="#aaa" text-anchor="middle">shoppers panicked.</text>
  <text x="500" y="880" font-family="Georgia, serif" font-size="30" fill="#d4af37" text-anchor="middle">The smart ones looked inward.</text>
  <polygon points="500,960 515,975 500,990 485,975" fill="#d4af37"/>

  <!-- Footer -->
  <rect x="0" y="1380" width="1000" height="120" fill="#0f0f1a" opacity="0.9"/>
  <text x="500" y="1430" font-family="Georgia, serif" font-size="36" fill="#d4af37" text-anchor="middle" font-weight="bold">DRIPMATIQ.APP</text>
  <text x="500" y="1465" font-family="Georgia, serif" font-size="18" fill="#888" text-anchor="middle">/blog/everlane-alternatives-closet-audit</text>
  <!-- Gold accent line -->
  <rect x="100" y="1375" width="800" height="2" fill="#d4af37" opacity="0.6"/>
